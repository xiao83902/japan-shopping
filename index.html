  <style>

r-radius:8px;padding:8px 11px;background:#fffdf8;color:var(--ink)}input[type=number]{text-align:right;font-variant-numeric:tabular-nums}select{appearance:none;padding-right:34px;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 18px) 19px,calc(100% - 13px) 19px;background-size:5px 5px;background-repeat:no-repeat}.summary{margin-top:12px;padding:11px 12px;border:1px solid var(--line);border-radius:8px;background:#fbf7ef;display:flex;flex-wrap:wrap;gap:8px 14px;align-items:baseline}.summary strong{margin-left:auto;color:var(--red);font-variant-numeric:tabular-nums}.status{font-weight:780;color:#23354f}.image{position:relative;min-height:350px;max-height:58vh;border:1px dashed #cfc5b4;border-radius:8px;background:#fbfcfa;overflow:hidden;display:grid;place-items:center}.image img{display:none;width:100%;height:100%;object-fit:contain}.image.has img{display:block}.image.has .empty{display:none}.empty{color:var(--muted);display:grid;gap:8px;place-items:center;text-align:center}.empty svg{width:44px;height:44px;color:var(--indigo)}.progress{gap:10px;margin:14px 0}.track{height:10px;flex:1;background:#e8e2d7;border-radius:999px;overflow:hidden}.track span{display:block;width:0;height:100%;background:linear-gradient(90deg,var(--red),var(--indigo));transition:width .18s}#progressLabel{width:48px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}.ocr{min-height:166px;resize:vertical;line-height:1.55}.panel-actions{justify-content:flex-end;gap:8px;margin-top:12px}.items-head{justify-content:space-between;margin:22px 0 10px}.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:8px;background:white}table{width:100%;border-collapse:collapse;table-layout:fixed}th,td{padding:8px;border-bottom:1px solid var(--line)}th{text-align:left;color:#34434b;background:#f3eadc;font-size:.84rem}th:nth-child(2),td:nth-child(2){width:clamp(92px,22%,124 e:nowrap;font-variant-numeric:tabular-nums}.more{margin-top:6px;border-top:1px solid rgba(207,197,180,.66)}.more summary{display:flex;justify-content:center;align-items:center;min-height:34px;color:var(--indigo);font-size:.86rem;font-weight:760;cursor:pointer;list-style:none}.more summary::-webkit-details-marker{display:none}.sideTotal{display:grid;justify-items:end;gap:8px;text-align:right}.sideTotal small{color:var(--muted);font-weight:720}.total{color:var(--red);font-size:1.3rem;font-weight:820;font-variant-numeric:tabular-nums}.emptyState{color:var(--muted);border:1px dashed #cfc5b4;border-radius:8px;padding:18px;text-align:center;background:rgba(255,255,255,.56)}svg{width:18px;height:18px;stroke-width:2;flex:0 0 auto}@media(max-width:1280px){.main{padding:24px}.tripgrid{grid-template-columns:minmax(0,1fr) minmax(136px,.58fr) minmax(136px,.58fr)}.tripgrid .primary{grid-column:1/-1;justify-self:end}.query{grid-template-columns:minmax(0,1fr) minmax(136px,.58fr)}}@media(max-width:1120px){.work{grid-template-columns:1fr}.image{min-height:300px}}@media(max-width:1040px){.app{grid-template-columns:1fr}.side{position:relative;height:auto;display:grid;grid-template-columns:minmax(220px,1fr) minmax(220px,.8fr);align-items:center}.stats{margin-top:0;grid-column:1/-1;grid-template-columns:repeat(3,minmax(0,1fr))}.tripgrid,.query{grid-template-columns:repeat(2,minmax(0,1fr))}.tripgrid .primary{grid-column:auto;justify-self:stretch}}@media(max-width:720px){.main{padding:16px}h1{font-size:1.82rem}.side{padding:18px 16px;grid-template-columns:1fr}.stats{grid-template-columns:1fr}.top,.save{align-items:stretch;flex-direction:column}.actions,.panel-actions{justify-content:flex-start;flex-wrap:wrap}.actions .text,.panel-actions .text{flex:1 1 150px}.fields,.tripgrid,.query{grid-template-columns:1fr}.image{min-height:250px;max-height:52vh}.tripgrid .primary{width:100%}.summary{display:grid}.summary strong{margin-left:0}.record{grid-template-columns:1fr}.meta,.lines{margin-left:0}.sideTotal{justify-items:start;text-align:left}.total,.price{white-space:normal}}@media(max-width:560px){.main{padding:12px}.side{padding:16px 12px;gap:14px}.mark,.capicon{width:40px;height:40px}.capture{min-height:72px;padding:12px}.stat{min-height:64px;padding:10px 12px}.stat strong{font-size:1.16rem}.panel,.records{padding:14px}.image{min-height:220px}th,td{padding:7px 6px}th:nth-child(2),td:nth-child(2){width:92px}th:last-child,td:last-child{width:42px}td input{min-height:38px;padding:6px 8px}.save .primary{width:100%}#hint{text-align:left}.daily{grid-template-columns:1fr}.record{padding:12px}.lines{padding:10px}}@media(max-width:420px){h1{font-size:1.58rem}.kicker{font-size:.72rem}.btn,.icon,.primary{min-height:40px}.text{padding:0 10px}}

<body>
<div class="app">
  <aside class="side"><div class="brand"><span class="mark"><i data-lucide="receipt-text"></i></span><div><div class="brand-title">日本旅遊消費</div><div class="brand-sub">Trip receipt log</div></div></div><label class="capture"><input id="photo" type="file" accept="image/*" capture="environment"><span class="capicon"><i data-lucide="camera"></i></span><span><strong>掃描旅費收據</strong><small>Camera / Upload</small></span></label><button id="demo" class="btn" type="button"><i data-lucide="sparkles"></i><span>載入範例</span></button><div class="stats"><div class="stat"><span><small>今日旅費</small><em>Trip day</em></span><strong id="today">¥0</strong></div><div class="stat"><span><small>旅程總額</small><em>Trip total</em></span><strong id="tripTotal">¥0</strong></div><div class="stat"><span><small>收據筆數</small><em>Receipts</em></span><strong id="count">0</strong></div></div></aside>
  <main class="main"><header class="top row"><div><span class="kicker">Travel Expense Scan</span><h1>旅費收據掃描</h1><p id="status">等待照片</p></div><div class="actions"><button id="export" class="icon text" type="button"><i data-lucide="download"></i><span>CSV</span></button><button id="clear" class="icon danger" type="button" title="清除所有旅遊消費紀錄"><i data-lucide="trash-2"></i></button></div></header>
    <section class="panel trip"><div class="title"><span><i data-lucide="map-pinned"></i></span><h2>旅程時間</h2></div><div class="grid tripgrid"><label><span>旅程名稱</span><input id="tripName" placeholder="例：東京自由行"></label><label><span>開始日期</span><input id="tripStart" type="date"></label><label><span>結束日期</span><input id="tripEnd" type="date"></label><button id="saveTrip" class="primary" type="button"><i data-lucide="archive"></i><span>儲存旅程區間</span></button></div><div id="tripSummary" class="summary"></div></section>
    <section class="grid work"><section class="panel"><div class="title"><span><i data-lucide="image-up"></i></span><h2>照片與文字</h2></div><div id="imageBox" class="image"><img id="preview" alt="收據照片預覽"><div class="empty"><i data-lucide="image-up"></i><span>Receipt Photo</span></div></div><div class="progress"><div class="track"><span id="fill"></span></div><span id="pct">0%</span></div><textarea id="ocr" class="ocr" spellcheck="false" placeholder="OCR 文字會出現在這裡，可直接修正後重新解析旅費內容。"></textarea><div class="panel-actions row"><button id="parse" class="icon text"><i data-lucide="scan-text"></i><span>重新解析</span></button><button id="reset" class="icon text"><i data-lucide="rotate-ccw"></i><span>重設草稿</span></button></div></section>
      <section class="panel"><div class="title"><span><i data-lucide="clipboard-list"></i></span><h2>旅遊消費內容</h2></div><div class="grid fields"><label><span>消費地點</span><input id="store"></label><label><span>日期</span><input id="date" type="date"></label><label><span>總金額</span><input id="total" type="number" min="0" step="1"></label></div><div class="items-head"><h2>品項</h2><button id="add" class="icon"><i data-lucide="plus"></i></button></div><div class="tablewrap"><table><thead><tr><th>品名</th><th>金額</th><th></th></tr></thead><tbody id="items"></tbody></table></div><div class="save row"><button id="save" class="primary"><i data-lucide="save"></i><span>儲存這筆旅費</span></button><span id="hint"></span></div></section></section>
    <section class="records"><div class="title"><div><span class="kicker">Trip Daily Summary</span><h2>旅程每日花費</h2></div></div><div class="grid query"><label><span>旅程</span><select id="tripFilter"></select></label><label><span>日期</span><input id="dateFilter" type="date"></label><label><span>關鍵字</span><input id="keyword" type="search" placeholder="店家、品項"></label><button id="clearFilter" class="icon text"><i data-lucide="list-restart"></i><span>重設查詢</span></button></div><div id="daily" class="daily"></div><div id="records" class="list"></div></section>
  </main>
</div>
<script>
const $=s=>document.querySelector(s),storeKey='jp-trip-expenses.v1',tripKey='jp-trip.current.v1',ocrPaths={workerPath:'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js',corePath:'https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core.wasm.js',langPath:'https://tessdata.projectnaptha.com/4.0.0/'};let records=JSON.parse(localStorage.getItem(storeKey)||'[]'),trip=JSON.parse(localStorage.getItem(tripKey)||'null'),draftImg='';const sample=()=>`株式会社サンプルマート\n新宿南口店\n${jpDate()} 18:42\nおにぎり 鮭 138\n緑茶 600ml 129\n牛乳 218\nチョコレート 198\nメロンパン 158\nヨーグルト 128\n小計 969\n消費税 78\n合計 ¥1,047`;function iso(d=new Date()){return new Date(d.getTime()-d.getTimezoneOffset()*6e4).toISOString().slice(0,10)}function jpDate(){let d=iso().split('-');return `${d[0]}年${d[1]}月${d[2]}日`}function yen(n){return new Intl.NumberFormat('ja-JP',{style:'currency',currency:'JPY',maximumFractionDigits:0}).format(+n||0)}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function saveLS(){localStorage.setItem(storeKey,JSON.stringify(records))}function saveTripLS(){trip?localStorage.setItem(tripKey,JSON.stringify(trip)):localStorage.removeItem(tripKey)}function inTrip(d,t=trip){return t&&t.id&&d>=t.start&&d<=t.end}function tripRecs(){return trip?records.filter(r=>r.tripId===trip.id):records}function attach(r){return inTrip(r.date)?{...r,tripId:trip.id,tripName:trip.name,tripStart:trip.start,tripEnd:trip.end,archivedAt:r.archivedAt||new Date().toISOString()}:r}function setStatus(s){$('#status').textContent=s}function progress(v,s){v=Math.max(0,Math.min(100,Math.round(v)));$('#fill').style.width=v+'%';$('#pct').textContent=v+'%';if(s)setStatus(s)}function norm(t){return String(t||'').replace(/[！-～]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0)).replace(/　/g,' ').replace(/￥/g,'¥').replace(/[，、]/g,',').replace(/\r/g,'\n').split('\n').map(l=>l.replace(/\s+/g,' ').trim()).filter(Boolean).join('\n')}function amounts(l){let out=[],re=/(?:¥\s*)?-?\d{1,3}(?:,\d{3})+|-?\d{2,7}(?:\s*円)?/g,m;while((m=re.exec(l))){let n=+m[0].replace(/[^\d-]/g,'');if(Number.isFinite(n))out.push({v:n,i:m.index,raw:m[0]})}return out}function parseReceipt(raw){let text=norm(raw),lines=text.split('\n'),joined=lines.join('\n'),dm=joined.match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})|(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日/),date=iso();if(dm){let y=dm[1]||dm[4],m=dm[2]||dm[5],d=dm[3]||dm[6];date=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`}let store=lines.slice(0,10).find(l=>!amounts(l).length&&!/レシート|TEL|電話|住所|登録|日付|日時|〒/.test(l))||'未辨識店家',items=[];for(let l of lines){if(/合\s*計|小\s*計|消費税|税額|お預|釣|レシート|TEL|登録|日付|日時/.test(l)||/\d{1,2}:\d{2}|年.*月.*日/.test(l))continue;let a=amounts(l),last=a[a.length-1];if(!last)continue;let name=l.slice(0,last.i).replace(/^[*※\-\s]+/,'').trim();if(name.length>1&&last.v>0)items.push({name,price:last.v})}let total=0,cands=[];lines.forEach((l,i)=>{let a=amounts(l);if(a.length&&/合\s*計|総\s*合\s*計|お支払|領収金額/.test(l)&&!/消費税|お預|釣/.test(l))cands.push({v:a[a.length-1].v,i})});total=cands.length?cands.sort((a,b)=>b.i-a.i)[0].v:items.reduce((s,i)=>s+i.price,0);return{store,date,total,items,rawText:text}}function row(item={name:'',price:''}){let tr=document.createElement('tr');tr.innerHTML=`<td><input class="iname" value="${esc(item.name)}"></td><td><input class="iprice" type="number" min="0" step="1" value="${item.price||''}"></td><td><button class="icon danger rem"><i data-lucide="x"></i></button></td>`;tr.querySelector('.rem').onclick=()=>{tr.remove();if(!$('#items tr'))row();hint()};tr.querySelectorAll('input').forEach(i=>i.oninput=hint);$('#items').append(tr);lucide.createIcons()}function draft(){let items=[...document.querySelectorAll('#items tr')].map(r=>({name:r.querySelector('.iname').value.trim(),price:+r.querySelector('.iprice').value||0})).filter(i=>i.name||i.price);return{store:$('#store').value.trim()||'未命名店家',date:$('#date').value||iso(),total:+$('#total').value
