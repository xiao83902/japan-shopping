<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>日本旅遊消費紀錄</title>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="side">
        <div class="brand">
          <span class="mark"><i data-lucide="receipt-text"></i></span>
          <div>
            <div class="brand-title">日本旅遊消費</div>
            <div class="brand-sub">Trip receipt log</div>
          </div>
        </div>
        <label class="capture"
          ><input
            id="photo"
            type="file"
            accept="image/*"
            capture="environment"
          /><span class="capicon"><i data-lucide="camera"></i></span
          ><span
            ><strong>掃描旅費收據</strong><small>Camera / Upload</small></span
          ></label
        ><button id="demo" class="btn" type="button">
          <i data-lucide="sparkles"></i><span>載入範例</span>
        </button>
        <section class="syncbox" aria-label="跨裝置同步">
          <div class="sync-head">
            <span id="syncDot" class="sync-dot" aria-hidden="true"></span>
            <div>
              <strong>跨裝置同步</strong>
              <small id="syncStatus">本機保存</small>
            </div>
          </div>
          <label>
            <span>同步代碼</span>
            <input
              id="syncCode"
              type="password"
              autocomplete="off"
              placeholder="例：tokyo-2026"
            />
          </label>
          <div class="sync-actions">
            <button id="syncConnect" class="primary sync-connect" type="button">
              <i data-lucide="cloud"></i><span>連線同步</span>
            </button>
            <button id="syncNow" class="icon" type="button" title="立即同步">
              <i data-lucide="refresh-cw"></i>
            </button>
            <button
              id="syncDisconnect"
              class="icon danger"
              type="button"
              title="停用這台裝置的同步"
            >
              <i data-lucide="cloud-off"></i>
            </button>
          </div>
        </section>
        <div class="stats">
          <div class="stat">
            <span><small>今日旅費</small><em>Trip day</em></span
            ><strong id="today">¥0</strong>
          </div>
          <div class="stat">
            <span><small>旅程總額</small><em>Trip total</em></span
            ><strong id="tripTotal">¥0</strong>
          </div>
          <div class="stat">
            <span><small>收據筆數</small><em>Receipts</em></span
            ><strong id="count">0</strong>
          </div>
        </div>
      </aside>
      <main class="main">
        <header class="top row">
          <div>
            <span class="kicker">Travel Expense Scan</span>
            <h1>旅費收據掃描</h1>
            <p id="status">等待照片</p>
          </div>
          <div class="actions">
            <button id="export" class="icon text" type="button">
              <i data-lucide="download"></i><span>CSV</span></button
            ><button
              id="clear"
              class="icon danger"
              type="button"
              title="清除所有旅遊消費紀錄"
            >
              <i data-lucide="trash-2"></i>
            </button>
          </div>
        </header>
        <section class="panel trip">
          <div class="title">
            <span><i data-lucide="map-pinned"></i></span>
            <h2>旅程時間</h2>
          </div>
          <div class="grid tripgrid">
            <label
              ><span>旅程名稱</span
              ><input id="tripName" placeholder="例：東京自由行" /></label
            ><label
              ><span>開始日期</span><input id="tripStart" type="date" /></label
            ><label
              ><span>結束日期</span><input id="tripEnd" type="date" /></label
            ><button id="saveTrip" class="primary" type="button">
              <i data-lucide="archive"></i><span>儲存旅程區間</span>
            </button>
          </div>
          <div id="tripSummary" class="summary"></div>
        </section>
        <section class="grid work">
          <section class="panel">
            <div class="title">
              <span><i data-lucide="image-up"></i></span>
              <h2>照片與文字</h2>
            </div>
            <div id="imageBox" class="image">
              <img id="preview" alt="收據照片預覽" />
              <div class="empty">
                <i data-lucide="image-up"></i><span>Receipt Photo</span>
              </div>
            </div>
            <div class="progress">
              <div class="track"><span id="fill"></span></div>
              <span id="pct">0%</span>
            </div>
            <textarea
              id="ocr"
              class="ocr"
              spellcheck="false"
              placeholder="OCR 文字會出現在這裡，可直接修正後重新解析旅費內容。"
            ></textarea>
            <div class="panel-actions row">
              <button id="parse" class="icon text">
                <i data-lucide="scan-text"></i><span>重新解析</span></button
              ><button id="reset" class="icon text">
                <i data-lucide="rotate-ccw"></i><span>重設草稿</span>
              </button>
            </div>
          </section>
          <section class="panel">
            <div class="title">
              <span><i data-lucide="clipboard-list"></i></span>
              <h2>旅遊消費內容</h2>
            </div>
            <div class="grid fields">
              <label><span>消費地點</span><input id="store" /></label
              ><label><span>日期</span><input id="date" type="date" /></label
              ><label
                ><span>總金額</span
                ><input id="total" type="number" min="0" step="1"
              /></label>
            </div>
            <div class="items-head">
              <h2>品項</h2>
              <button id="add" class="icon"><i data-lucide="plus"></i></button>
            </div>
            <div class="tablewrap">
              <table>
                <thead>
                  <tr>
                    <th>品名</th>
                    <th>金額</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="items"></tbody>
              </table>
            </div>
            <div class="save row">
              <button id="save" class="primary">
                <i data-lucide="save"></i><span>儲存這筆旅費</span></button
              ><span id="hint"></span>
            </div>
          </section>
        </section>
        <section class="records">
          <div class="title">
            <div>
              <span class="kicker">Trip Daily Summary</span>
              <h2>旅程每日花費</h2>
            </div>
          </div>
          <div class="grid query">
            <label
              ><span>旅程</span
              ><select id="tripFilter"></select></label
            ><label
              ><span>日期</span><input id="dateFilter" type="date" /></label
            ><label
              ><span>關鍵字</span
              ><input
                id="keyword"
                type="search"
                placeholder="店家、品項" /></label
            ><button id="clearFilter" class="icon text">
              <i data-lucide="list-restart"></i><span>重設查詢</span>
            </button>
          </div>
          <div id="daily" class="daily"></div>
          <div id="records" class="list"></div>
        </section>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
