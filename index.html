<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6f5f1" />
    <title>掃描辨識｜日本旅遊消費紀錄</title>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="scan">
    <div class="app">
      <aside class="side">
        <a class="brand" href="./" aria-label="日本旅遊消費">
          <span class="mark"><i data-lucide="receipt-text"></i></span>
          <span>
            <span class="brand-title">日本旅遊消費</span>
            <span class="brand-sub">旅程收據管理</span>
          </span>
        </a>
        <nav class="nav" aria-label="主要頁面">
          <a class="navlink active" href="./">
            <i data-lucide="scan-line"></i><span>掃描辨識</span>
          </a>
          <a class="navlink" href="./history.html">
            <i data-lucide="search"></i><span>歷史查詢</span>
          </a>
        </nav>
        <section class="syncbox" aria-label="跨裝置同步">
          <div class="sync-head">
            <span id="syncDot" class="sync-dot" aria-hidden="true"></span>
            <div>
              <strong>跨裝置同步</strong>
              <small id="syncStatus">本機保存</small>
            </div>
          </div>
          <label>
            <span>同步代碼</span>
            <input
              id="syncCode"
              type="password"
              autocomplete="off"
              placeholder="例：tokyo-2026"
            />
          </label>
          <div class="sync-actions">
            <button id="syncConnect" class="primary sync-connect" type="button">
              <i data-lucide="cloud"></i><span>連線同步</span>
            </button>
            <button id="syncNow" class="icon" type="button" title="立即同步">
              <i data-lucide="refresh-cw"></i>
            </button>
            <button
              id="syncDisconnect"
              class="icon danger"
              type="button"
              title="停用這台裝置的同步"
            >
              <i data-lucide="cloud-off"></i>
            </button>
          </div>
        </section>
        <div class="stats" aria-label="旅程統計">
          <div class="stat">
            <span><small>今日旅費</small><em>目前日期</em></span>
            <strong id="today">¥0</strong>
          </div>
          <div class="stat">
            <span><small>旅程總額</small><em>目前旅程</em></span>
            <strong id="tripTotal">¥0</strong>
          </div>
          <div class="stat">
            <span><small>收據筆數</small><em>已歸檔</em></span>
            <strong id="count">0</strong>
          </div>
        </div>
      </aside>
      <main class="main">
        <header class="top scan-top">
          <div>
            <h1>掃描辨識</h1>
            <p id="status" class="statusline" aria-live="polite"></p>
          </div>
          <label class="capture"
            ><input
              id="photo"
              type="file"
              accept="image/*"
              capture="environment"
            /><span class="capicon"><i data-lucide="camera"></i></span
            ><span
              ><strong>拍攝收據</strong><small>手機可直接開啟相機</small></span
            ></label
          >
        </header>
        <section class="panel trip">
          <div class="title">
            <span><i data-lucide="map-pinned"></i></span>
            <h2>旅程時間</h2>
          </div>
          <div class="grid tripgrid">
            <label
              ><span>旅程名稱</span
              ><input id="tripName" placeholder="例：東京自由行" /></label
            ><label
              ><span>開始日期</span><input id="tripStart" type="date" /></label
            ><label
              ><span>結束日期</span><input id="tripEnd" type="date" /></label
            ><button id="saveTrip" class="primary" type="button">
              <i data-lucide="archive"></i><span>儲存旅程區間</span>
            </button>
          </div>
          <div id="tripSummary" class="summary"></div>
        </section>
        <section class="grid work">
          <section class="panel scan-panel">
            <div class="title">
              <span><i data-lucide="image-up"></i></span>
              <h2>照片與文字</h2>
            </div>
            <div id="imageBox" class="image">
              <img id="preview" alt="收據照片預覽" />
              <div class="empty">
                <i data-lucide="image-up"></i><span>尚未選擇收據照片</span>
              </div>
            </div>
            <div class="progress">
              <div class="track"><span id="fill"></span></div>
              <span id="pct">0%</span>
            </div>
            <textarea
              id="ocr"
              class="ocr"
              spellcheck="false"
              placeholder="辨識文字會出現在這裡，可修正後重新解析。"
            ></textarea>
            <div class="panel-actions row">
              <button id="demo" class="icon text" type="button">
                <i data-lucide="sparkles"></i><span>載入範例</span></button
              ><button id="parse" class="icon text" type="button">
                <i data-lucide="scan-text"></i><span>重新解析</span></button
              ><button id="reset" class="icon text" type="button">
                <i data-lucide="rotate-ccw"></i><span>重設草稿</span>
              </button>
            </div>
          </section>
          <section class="panel edit-panel">
            <div class="title">
              <span><i data-lucide="clipboard-list"></i></span>
              <h2>消費內容</h2>
            </div>
            <div class="grid fields">
              <label><span>消費地點</span><input id="store" /></label
              ><label><span>日期</span><input id="date" type="date" /></label
              ><label
                ><span>總金額</span
                ><input id="total" type="number" min="0" step="1"
              /></label>
            </div>
            <div class="items-head">
              <h2>品項</h2>
              <button id="add" class="icon" type="button" title="新增品項">
                <i data-lucide="plus"></i>
              </button>
            </div>
            <div class="tablewrap">
              <table>
                <thead>
                  <tr>
                    <th>品名</th>
                    <th>金額</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="items"></tbody>
              </table>
            </div>
            <div class="save row">
              <button id="save" class="primary" type="button">
                <i data-lucide="save"></i><span>儲存這筆旅費</span></button
              ><span id="hint"></span>
            </div>
          </section>
        </section>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
